# Bytebase Standalone Frontend — Nginx Configuration
#
# This config serves the built frontend as a single-page application (SPA)
# and proxies API requests to the Bytebase backend.
#
# Environment variables (set via Docker or deploy-time):
#   BYTEBASE_API_URL  — Backend URL (default: http://localhost:8080)
#
# Usage:
#   docker run -e BYTEBASE_API_URL=https://api.bytebase.example.com \
#     -p 80:80 bytebase-frontend

upstream bytebase_api {
    server ${BYTEBASE_API_URL};
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ─── Security headers ─────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ─── SPA routing ──────────────────────────────────────
    # All unmatched routes serve index.html for client-side routing.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Static assets (immutable cache) ──────────────────
    # Vite-built assets have content hashes in filenames.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ─── ConnectRPC API proxy ─────────────────────────────
    # ConnectRPC uses /bytebase.v1.* service paths.
    location /bytebase.v1. {
        proxy_pass http://bytebase_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # gRPC-Web and ConnectRPC headers
        proxy_set_header Connection "";
        proxy_buffering off;
    }

    # ─── REST gateway proxy ───────────────────────────────
    location /v1/ {
        proxy_pass http://bytebase_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ─── LSP WebSocket proxy ──────────────────────────────
    location /lsp {
        proxy_pass http://bytebase_api;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # ─── MCP SSE proxy ────────────────────────────────────
    # Server-Sent Events require no buffering.
    location /mcp/ {
        proxy_pass http://bytebase_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
    }

    # ─── Webhook proxy ────────────────────────────────────
    location /hook/ {
        proxy_pass http://bytebase_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── Health check ─────────────────────────────────────
    location = /nginx-health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }
}
