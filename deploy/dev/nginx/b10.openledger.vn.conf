# ── b10-openledger-nginx.conf ──────────────────────────────────────────────────
# Domain  : b10.openledger.vn
# Service : Bytebase Database CI/CD
# Upstream: bytebase_backend (172.20.2.41:18081)
# Deployed via: deploy/dev/deploy.sh nginx-install
# ──────────────────────────────────────────────────────────────────────────────

upstream bytebase_backend {
    server 172.20.2.41:18081;
    keepalive 32;
}

# ── HTTP → HTTPS redirect ─────────────────────────────────────────────────────
server {
    listen 80;
    server_name b10.openledger.vn;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS Main Server ─────────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name b10.openledger.vn;

    # ── TLS (Let's Encrypt) ──────────────────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/b10.openledger.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/b10.openledger.vn/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/b10.openledger.vn/chain.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL_b10:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    nosniff   always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-Frame-Options           SAMEORIGIN always;

    client_max_body_size   100m;
    proxy_read_timeout    300s;
    proxy_connect_timeout  10s;
    proxy_send_timeout    300s;

    # ── gRPC/ConnectRPC — streaming SQL Admin Execute ─────────────────────────
    location /v1:adminExecute {
        proxy_pass http://bytebase_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── WebSocket — LSP (Language Server Protocol) ────────────────────────────
    location /lsp {
        proxy_pass http://bytebase_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 3600s;
    }

    # ── SSE — MCP Server (Model Context Protocol) ─────────────────────────────
    location /mcp/ {
        proxy_pass http://bytebase_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection        "";
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # ── Health check (no access log) ──────────────────────────────────────────
    location = /healthz {
        proxy_pass http://bytebase_backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # ── General: All Bytebase traffic ─────────────────────────────────────────
    location / {
        proxy_pass http://bytebase_backend;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Connection        "";
        proxy_buffering on;
        proxy_buffer_size 16k;
        proxy_buffers 8 32k;
    }

    error_page 502 503 504 /50x.html;
    location = /50x.html { root /usr/share/nginx/html; }
}
